<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabyBudget | Prep for Arrival</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --surface-glass: rgba(30, 41, 59, 0.4);
            --surface-solid: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.2);
            --shadow-soft: 0 20px 40px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 30px 60px rgba(0, 0, 0, 0.6);
            
            --gradient-primary: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            --gradient-hover: linear-gradient(135deg, #b5a3df 0%, #fcd3f2 100%);
            
            --radius-lg: 32px;
            --radius-md: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #f8fafc;
            line-height: 1.6;
            padding-bottom: 90px;
            min-height: 100vh;
            background-color: #07090f;
            background-image: 
                radial-gradient(at 0% 0%, rgba(161, 140, 209, 0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(251, 194, 235, 0.05) 0, transparent 50%), 
                radial-gradient(at 50% 100%, rgba(132, 250, 176, 0.05) 0, transparent 50%);
            position: relative;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%; z-index: -1; filter: blur(100px); opacity: 0.3;
        }
        body::before { width: 600px; height: 600px; background: #5b21b6; top: -150px; left: -150px; }
        body::after { width: 700px; height: 700px; background: #be185d; bottom: -150px; right: -150px; }

        nav {
            padding: 24px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass); position: sticky; top: 0; z-index: 50;
        }

        .logo {
            font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px;
            background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            cursor: pointer; transition: opacity 0.2s; user-select: none;
        }
        .logo:hover { opacity: 0.8; }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }

        .view-section { transition: opacity 0.4s ease, transform 0.4s ease; }
        .hidden-view { opacity: 0; transform: translateY(20px); pointer-events: none; position: absolute; visibility: hidden; }
        .active-view { opacity: 1; transform: translateY(0); pointer-events: all; position: relative; visibility: visible; }

        #setup-view { text-align: center; }
        h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.1; letter-spacing: -1.5px; }
        .subtitle { color: var(--text-muted); font-size: 1.25rem; margin-bottom: 3rem; font-weight: 500; }

        .control-panel {
            background: var(--surface-glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 50px; border-radius: var(--radius-lg); border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-soft);
        }

        .gender-selector { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; }
        .gender-label {
            background: rgba(255,255,255,0.05); padding: 14px 32px; border-radius: 40px;
            cursor: pointer; font-weight: 600; font-size: 1.05rem; border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); color: var(--text-muted);
        }
        .gender-radio { display: none; }
        
        input[value="boy"]:checked + .gender-label {
            background: rgba(161, 196, 253, 0.1); border-color: #a1c4fd; color: #a1c4fd;
            box-shadow: 0 10px 20px rgba(161, 196, 253, 0.1); transform: translateY(-2px);
        }
        input[value="girl"]:checked + .gender-label {
            background: rgba(251, 194, 235, 0.1); border-color: #fbc2eb; color: #fbc2eb;
            box-shadow: 0 10px 20px rgba(251, 194, 235, 0.1); transform: translateY(-2px);
        }
        input[value="neutral"]:checked + .gender-label {
            background: rgba(251, 211, 141, 0.1); border-color: #fbd38d; color: #fbd38d;
            box-shadow: 0 10px 20px rgba(251, 211, 141, 0.1); transform: translateY(-2px);
        }

        .category-selector { margin-bottom: 40px; }
        .category-title-label { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .toggles-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .cat-label {
            background: rgba(255,255,255,0.05); padding: 12px 24px; border-radius: 30px;
            cursor: pointer; font-size: 0.95rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease; color: var(--text-muted);
        }
        .cat-checkbox { display: none; }
        .cat-checkbox:checked + .cat-label { background: #f8fafc; color: #0f172a; border-color: #f8fafc; }
        .cat-checkbox:not(:checked) + .cat-label { opacity: 0.4; text-decoration: line-through; }

        .budget-display { font-size: 5rem; font-weight: 800; color: #f8fafc; margin-bottom: 10px; letter-spacing: -2px; }
        
        .slider-wrapper { position: relative; margin: 30px 0 40px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; outline: none; }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 36px; width: 36px; border-radius: 50%;
            background: var(--gradient-primary); cursor: grab; margin-top: -14px;
            box-shadow: 0 0 20px rgba(161, 140, 209, 0.5); border: 4px solid #0f172a;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
        }
        
        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.3); cursor: grabbing; box-shadow: 0 0 30px rgba(161, 140, 209, 0.8);
        }

        @keyframes jellyShake {
            0% { transform: scale(1.3) translateX(0); }
            25% { transform: scale(1.05) translateX(-4px); }
            50% { transform: scale(1.1) translateX(4px); }
            75% { transform: scale(0.95) translateX(-2px); }
            100% { transform: scale(1) translateX(0); }
        }
        input[type=range].shake-effect::-webkit-slider-thumb {
            animation: jellyShake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 10px; }

        .primary-btn {
            background: var(--gradient-primary); color: #0f172a; border: none; padding: 20px 48px;
            font-size: 1.15rem; font-weight: 800; border-radius: 40px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); width: 100%; max-width: 320px;
            box-shadow: 0 10px 30px rgba(161, 140, 209, 0.3); position: relative; overflow: hidden;
        }
        .primary-btn:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(161, 140, 209, 0.5); background: var(--gradient-hover); }
        .primary-btn:active { transform: translateY(2px); }
        .primary-btn:disabled { opacity: 0.5; transform: none; box-shadow: none; cursor: not-allowed; }

        .secondary-btn {
            background: transparent; color: #f8fafc; border: 1px solid var(--border-glass);
            padding: 12px 28px; border-radius: 30px; cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .secondary-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--border-highlight); transform: translateY(-2px); }

        .results-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }

        .pie-chart-container {
            display: flex; align-items: center; gap: 30px; margin-bottom: 50px;
            background: var(--surface-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 30px; border-radius: var(--radius-lg); border: 1px solid var(--border-glass); box-shadow: var(--shadow-soft);
        }
        .pie-chart { width: 120px; height: 120px; filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.5)); transform: scale(0); animation: popIn 0.6s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; flex-shrink: 0;}
        .chart-legend { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 24px; font-weight: 500; width: 100%; }
        .legend-item { display: flex; align-items: center; gap: 10px; color: #f8fafc; font-size: 0.95rem; opacity: 0; animation: fadeIn 0.4s ease forwards; }
        .legend-color { width: 14px; height: 14px; border-radius: 50%; box-shadow: 0 0 10px currentColor; flex-shrink: 0;}

        .category-section { margin-bottom: 60px; }
        .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-glass); padding-bottom: 15px;}
        .category-title { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .category-allocation-wrapper { position: relative; display: inline-block; cursor: help; }
        .category-allocation { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); 
            padding: 8px 20px; border-radius: 30px; font-weight: 700; font-size: 1.1rem; 
            transition: all 0.2s;
        }
        .category-allocation-wrapper:hover .category-allocation { background: rgba(255,255,255,0.1) !important; transform: translateY(-2px); }
        
        .subtotal-tooltip {
            visibility: hidden; width: 340px; background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); color: #f8fafc; text-align: left;
            padding: 24px; border-radius: 16px; border: 1px solid var(--border-highlight); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: absolute; z-index: 100; bottom: 130%; right: 0; opacity: 0; transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); font-size: 0.9rem; font-weight: 500; line-height: 1.6;
        }
        .subtotal-tooltip::after { content: ''; position: absolute; top: 100%; right: 0; width: 100%; height: 30%; }
        .category-allocation-wrapper:hover .subtotal-tooltip { visibility: visible; opacity: 1; transform: translateY(0); }

        .cat-target-note { font-size: 0.8rem; font-weight: 500; opacity: 0.6; display: block; margin-top: 4px; color: var(--text-muted); }

        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        
        .product-card {
            background: var(--surface-solid); border: 1px solid var(--border-glass);
            border-radius: var(--radius-md); padding: 24px; display: flex; flex-direction: column;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); backdrop-filter: blur(10px);
            opacity: 0; transform: translateX(60px); transition: box-shadow 0.3s, border-color 0.3s, transform 0.3s;
        }
        .product-card:hover { box-shadow: var(--shadow-hover); border-color: var(--border-highlight); transform: translateY(-6px) !important; }

        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }
        @keyframes popIn { to { transform: scale(1); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } } /* Spinner animation added */

        .product-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
        .product-desc { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 24px; flex-grow: 1; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-glass); padding-top: 20px; }
        .product-price { font-size: 1.4rem; font-weight: 800; color: #f8fafc; }
        
        .buy-btn {
            background: rgba(255,255,255,0.1); color: #f8fafc; text-decoration: none; border: 1px solid var(--border-glass);
            padding: 8px 18px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
        }
        .buy-btn:hover { background: #f8fafc; color: #0f172a; transform: scale(1.05); }

        .grand-total-card {
            background: var(--surface-glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 40px; border-radius: var(--radius-lg); border: 1px solid var(--border-highlight);
            box-shadow: 0 0 40px rgba(161, 140, 209, 0.1); text-align: center; margin-top: 60px;
            opacity: 0; transform: translateY(30px); animation: slideInRight 0.8s 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .gt-label { font-size: 1.1rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .gt-value { font-size: 4.5rem; font-weight: 800; color: #f8fafc; letter-spacing: -2px; line-height: 1; margin-bottom: 15px; }
        .gt-target { font-size: 1rem; color: var(--text-muted); font-weight: 500; }
        .gt-target span { font-weight: 700; color: #f8fafc; }

        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .container { padding: 30px 15px; }
            h1 { font-size: 2.2rem; letter-spacing: -0.5px; }
            .subtitle { font-size: 1.05rem; margin-bottom: 2rem; }
            
            .control-panel { padding: 30px 20px; border-radius: var(--radius-md); }
            .budget-display { font-size: 3.5rem; }
            
            .gender-selector { flex-direction: column; align-items: stretch; gap: 10px; }
            .gender-label { text-align: center; }
            
            .toggles-grid { gap: 8px; }
            .cat-label { padding: 10px 16px; font-size: 0.85rem; }

            .results-header { flex-direction: column; align-items: flex-start; gap: 20px; }
            
            .pie-chart-container { flex-direction: column; padding: 25px 20px; gap: 25px; align-items: center; text-align: left; }
            .chart-legend { grid-template-columns: 1fr; gap: 12px; }
            
            .category-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .category-header > div:last-child { text-align: left !important; width: 100%; }
            
            .subtotal-tooltip { width: 100%; min-width: 280px; bottom: 100%; left: 0; right: auto; margin-bottom: 15px; }
            .subtotal-tooltip::after { display: none; } 

            .grand-total-card { padding: 30px 20px; }
            .gt-value { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" id="logoBtn">BabyBudget</div>
    </nav>

    <div class="container">
        
        <div id="setup-view" class="view-section active-view">
            <h1>Curate your baby's world.</h1>
            <p class="subtitle">Set your budget, deselect what you already own, and we'll perfectly balance the rest.</p>
            
            <div class="control-panel">
                <div class="gender-selector">
                    <label>
                        <input type="radio" name="gender" value="boy" class="gender-radio">
                        <div class="gender-label">Boy</div>
                    </label>
                    <label>
                        <input type="radio" name="gender" value="girl" class="gender-radio">
                        <div class="gender-label">Girl</div>
                    </label>
                    <label>
                        <input type="radio" name="gender" value="neutral" class="gender-radio" checked>
                        <div class="gender-label">Neutral</div>
                    </label>
                </div>

                <div class="category-selector">
                    <div class="category-title-label">Select Your Needs</div>
                    <div class="toggles-grid" id="categoryTogglesContainer"></div>
                </div>

                <div class="budget-display" id="budgetDisplay">$1,000</div>
                <div class="slider-wrapper">
                    <input type="range" id="budgetSlider" min="300" max="4000" step="50" value="1000">
                </div>
                <button class="primary-btn" id="buildBtn">Generate My Kit</button>
            </div>
        </div>

        <div id="results-view" class="view-section hidden-view">
            <div class="results-header">
                <div>
                    <h2>Your Personalized Kit</h2>
                    <p style="color: var(--text-muted); font-size: 1.1rem; margin-top: 5px;">Populated with live retail prices.</p>
                </div>
                <button class="secondary-btn" id="startOverBtn">← Edit Setup</button>
            </div>

            <div class="pie-chart-container" id="pieChartSection">
                <div class="pie-chart" id="pieChartCanvas"></div>
                <div class="chart-legend" id="chartLegend"></div>
            </div>

            <div id="categories-container"></div>
            
            <div id="grand-total-container"></div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const setupView = document.getElementById('setup-view');
            const resultsView = document.getElementById('results-view');
            const budgetSlider = document.getElementById('budgetSlider');
            const budgetDisplay = document.getElementById('budgetDisplay');
            const buildBtn = document.getElementById('buildBtn');
            const startOverBtn = document.getElementById('startOverBtn');
            const logoBtn = document.getElementById('logoBtn');
            const categoriesContainer = document.getElementById('categories-container');
            const categoryTogglesContainer = document.getElementById('categoryTogglesContainer');
            const pieChartCanvas = document.getElementById('pieChartCanvas');
            const chartLegend = document.getElementById('chartLegend');
            const grandTotalContainer = document.getElementById('grand-total-container');

            const initialCategoryWeights = {
                "Nursery & Furniture": { 
                    weight: 0.25, color: "#bfa2db", 
                    explanation: "Nursery & Furniture accounts for a major portion of the budget because it includes foundational, heavy-duty items. High-ticket necessities like a durable crib, a quality mattress, and a comfortable glider quickly consume funds. Investing here ensures long-term comfort and safety for your newborn's sleep environment."
                }, 
                "Travel & Gear": { 
                    weight: 0.20, color: "#ffb7b2",
                    explanation: "Travel & Gear utilizes a large share of the budget due to the strict safety requirements and complex engineering of infant transport. An infant car seat and a reliable travel stroller are absolute necessities that cannot be compromised on quality. These items protect your baby during transit and provide essential mobility."
                }, 
                "Feeding & Nursing": { 
                    weight: 0.15, color: "#a1c4fd",
                    explanation: "Feeding & Nursing requires a dedicated allocation to cover the continuous, daily nutritional needs of your growing baby. Whether nursing or bottle-feeding, you will need a robust rotation of bottles, cleaning supplies, pillows, and eventually a high chair. Building a solid inventory prevents constant washing and late-night stress."
                }, 
                "Diapering Needs": { 
                    weight: 0.15, color: "#fbd38d",
                    explanation: "Diapering commands this allocation because babies go through an astonishing number of diapers and wipes in their first year. A proper setup requires a reliable diaper pail, changing pad, and a massive initial stockpile of newborn and size 1 diapers. Securing these funds prevents frantic late-night pharmacy runs."
                }, 
                "Clothing & Basics": { 
                    weight: 0.10, color: "#b6eacb",
                    explanation: "Clothing & Basics takes up a smaller but vital portion because newborns grow out of their initial sizes incredibly fast. Your focus here is on volume and comfort, requiring multiple daily changes of sleep-and-plays and bodysuits due to frequent messes. This ensures you have enough clean rotation without doing laundry daily."
                }, 
                "Bath & Health": { 
                    weight: 0.10, color: "#ffdac1",
                    explanation: "Bath & Health is allocated to safely manage your baby's hygiene and unexpected early illnesses. Specialized infant bathtubs, gentle skin care, and accurate healthcare tools like a reliable thermometer are vital but relatively affordable. Having these items on hand before your baby gets sick is crucial for peace of mind."
                }, 
                "Play & Soothing": { 
                    weight: 0.05, color: "#c1c8e4",
                    explanation: "Play & Soothing focuses on essential developmental tools and calming mechanisms for a relatively low cost. Items like a bouncer, a tummy-time mat, and pacifiers offer immense value for soothing a fussy baby. While babies don't need expensive toys early on, these basic items provide safe spots for them to rest."
                } 
            };

            const bundleTemplates = {
                "Nursery & Furniture": [
                    { name: "Crib or Bassinet", weight: 0.40, search: "crib bassinet" },
                    { name: "Nursery Glider", weight: 0.30, search: "nursery glider chair" },
                    { name: "Crib Mattress & Sheets", weight: 0.15, search: "crib mattress sheets" },
                    { name: "Video Baby Monitor", weight: 0.15, search: "video baby monitor" }
                ],
                "Travel & Gear": [
                    { name: "Infant Car Seat", weight: 0.45, search: "infant car seat" },
                    { name: "Travel Stroller", weight: 0.45, search: "baby stroller" },
                    { name: "Baby Carrier", weight: 0.10, search: "baby carrier wrap" }
                ],
                "Feeding & Nursing": [
                    { name: "Bottle Starter Set", weight: 0.35, search: "baby bottle starter set" },
                    { name: "Nursing Pillow & Pads", weight: 0.25, search: "nursing pillow breast pads" },
                    { name: "High Chair", weight: 0.25, search: "baby high chair" },
                    { name: "Burp Cloths", weight: 0.15, search: "cotton burp cloths" }
                ],
                "Diapering Needs": [
                    { name: "Diaper Stockpile", weight: 0.40, search: "newborn size 1 diapers" },
                    { name: "Baby Wipes Bulk Box", weight: 0.25, search: "water baby wipes bulk" },
                    { name: "Diaper Pail", weight: 0.20, search: "diaper pail" },
                    { name: "Changing Pad", weight: 0.15, search: "changing pad diaper cream" }
                ],
                "Clothing & Basics": [
                    { name: "Sleep & Plays", weight: 0.40, search: "sleep and play footies" },
                    { name: "Bodysuits", weight: 0.30, search: "bodysuits pack" },
                    { name: "Swaddle Blankets", weight: 0.20, search: "swaddle blankets" },
                    { name: "Socks & Mittens", weight: 0.10, search: "socks and mittens set" }
                ],
                "Bath & Health": [
                    { name: "Baby Bathtub", weight: 0.30, search: "baby bathtub" },
                    { name: "Healthcare Kit", weight: 0.30, search: "baby grooming kit thermometer" },
                    { name: "Towels & Washcloths", weight: 0.25, search: "baby hooded towel washcloths" },
                    { name: "Gentle Wash & Lotion", weight: 0.15, search: "gentle baby wash shampoo" }
                ],
                "Play & Soothing": [
                    { name: "Bouncer or Swing", weight: 0.60, search: "baby bouncer swing" },
                    { name: "Tummy Time Play Mat", weight: 0.30, search: "baby play mat gym" },
                    { name: "Pacifier Pack", weight: 0.10, search: "newborn pacifiers" }
                ]
            };

            Object.keys(bundleTemplates).forEach(cat => {
                const labelHtml = `
                    <label>
                        <input type="checkbox" value="${cat}" class="cat-checkbox" checked>
                        <div class="cat-label">${cat}</div>
                    </label>
                `;
                categoryTogglesContainer.insertAdjacentHTML('beforeend', labelHtml);
            });

            categoryTogglesContainer.addEventListener('change', () => {
                const checkedCount = document.querySelectorAll('.cat-checkbox:checked').length;
                buildBtn.disabled = checkedCount === 0;
            });

            budgetSlider.addEventListener('input', (e) => {
                budgetDisplay.textContent = '$' + parseInt(e.target.value).toLocaleString();
            });

            budgetSlider.addEventListener('mouseup', triggerShake);
            budgetSlider.addEventListener('touchend', triggerShake);

            function triggerShake() {
                budgetSlider.classList.remove('shake-effect');
                void budgetSlider.offsetWidth; 
                budgetSlider.classList.add('shake-effect');
            }

            function makeRealisticPrice(rawPrice) {
                if (rawPrice < 5) return Math.floor(rawPrice) + 0.99;
                return Math.floor(rawPrice) + 0.99;
            }

            function goToResults() {
                setupView.classList.remove('active-view');
                setupView.classList.add('hidden-view');
                
                setTimeout(() => {
                    resultsView.classList.remove('hidden-view');
                    resultsView.classList.add('active-view');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 400);
            }

            function goToSetup() {
                resultsView.classList.remove('active-view');
                resultsView.classList.add('hidden-view');
                
                setTimeout(() => {
                    setupView.classList.remove('hidden-view');
                    setupView.classList.add('active-view');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 300);
            }

            startOverBtn.addEventListener('click', goToSetup);
            logoBtn.addEventListener('click', goToSetup);

            buildBtn.addEventListener('click', async () => {
                if(buildBtn.disabled) return;

                const totalBudget = parseInt(budgetSlider.value);
                const selectedGenderInput = document.querySelector('input[name="gender"]:checked');
                const gender = selectedGenderInput ? selectedGenderInput.value : "neutral";
                const activeCategoryNames = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(cb => cb.value);
                
                let totalActiveWeight = 0;
                activeCategoryNames.forEach(cat => totalActiveWeight += initialCategoryWeights[cat].weight);

                const kitData = activeCategoryNames.map(name => {
                    return { 
                        name, 
                        color: initialCategoryWeights[name].color, 
                        explanation: initialCategoryWeights[name].explanation,
                        normalizedWeight: initialCategoryWeights[name].weight / totalActiveWeight 
                    }
                });

                // Clear previous and show loading spinner inside results
                categoriesContainer.innerHTML = `
                    <div id="loadingScreen" style="text-align: center; padding: 60px 0;">
                        <div style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--text-main); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                        <h3 style="color: var(--text-main); font-size: 1.5rem; margin-bottom: 8px;">Fetching Live Walmart Prices...</h3>
                        <p style="color: var(--text-muted);">Scanning trusted brands. This usually takes about 10-15 seconds.</p>
                    </div>
                `;
                grandTotalContainer.innerHTML = '';
                
                renderDonutChart(kitData);
                goToResults(); // Transition immediately so they see the spinner
                
                // Now run the async fetch
                await generateKitList(totalBudget, gender, kitData);
            });

            function renderDonutChart(kitData) {
                pieChartCanvas.innerHTML = ''; 
                chartLegend.innerHTML = ''; 

                let currentAngle = 0;
                const radius = 40;
                const centerX = 40;
                const centerY = 40;
                let svgHtml = `<svg width="100%" height="100%" viewBox="0 0 80 80">`;

                kitData.forEach((cat, index) => {
                    const sliceAngle = cat.normalizedWeight * 360;
                    const largeArcFlag = sliceAngle > 180 ? 1 : 0;
                    const gap = 1; 
                    const startRadians = (currentAngle + gap - 90) * (Math.PI / 180);
                    const endRadians = (currentAngle + sliceAngle - gap - 90) * (Math.PI / 180);

                    const startX = centerX + radius * Math.cos(startRadians);
                    const startY = centerY + radius * Math.sin(startRadians);
                    const endX = centerX + radius * Math.cos(endRadians);
                    const endY = centerY + radius * Math.sin(endRadians);

                    svgHtml += `
                        <path d="M${centerX},${centerY} L${startX},${startY} A${radius},${radius} 0 ${largeArcFlag},1 ${endX},${endY} Z" 
                              fill="${cat.color}" />
                    `;

                    const legendDelay = 0.4 + (index * 0.1);
                    const legendItemHtml = `
                        <div class="legend-item" style="animation-delay: ${legendDelay}s;">
                            <div class="legend-color" style="background-color: ${cat.color}; color: ${cat.color};"></div>
                            <span>${cat.name}</span>
                        </div>
                    `;
                    chartLegend.insertAdjacentHTML('beforeend', legendItemHtml);
                    currentAngle += sliceAngle;
                });

                svgHtml += `<circle cx="40" cy="40" r="24" fill="#141a28" /></svg>`;
                pieChartCanvas.insertAdjacentHTML('beforeend', svgHtml);
            }

            function animateValue(obj, start, end, duration) {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 5); 
                    const currentVal = (progress * (end - start) + start);
                    obj.innerHTML = `$${currentVal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                    if (progress < 1) window.requestAnimationFrame(step);
                    else obj.innerHTML = `$${end.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                };
                window.requestAnimationFrame(step);
            }

            async function generateKitList(totalTargetBudget, gender, kitData) {
                const genderStr = gender === "neutral" ? "gender neutral" : "baby " + gender;
                let actualGrandTotal = 0; 
                let globalItemIndex = 0; 
                
                // Store generated HTML chunks to render all at once, or we can append as they load.
                // We will append category by category so the user sees it building!
                let isFirstCategoryRendered = false;

                for (let catIndex = 0; catIndex < kitData.length; catIndex++) {
                    const cat = kitData[catIndex];
                    const categoryTargetBudget = totalTargetBudget * cat.normalizedWeight;
                    const items = bundleTemplates[cat.name];
                    
                    let itemsHTML = '';
                    let actualCategorySubtotal = 0; 

                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        const rawItemPrice = categoryTargetBudget * item.weight;
                        let retailItemPrice = makeRealisticPrice(rawItemPrice);
                        
                        const searchQuery = `${genderStr} ${item.search}`;
                        let displayTitle = cat.name === "Clothing & Basics" 
                            ? `${gender === 'neutral' ? 'Neutral' : gender.charAt(0).toUpperCase() + gender.slice(1)} ${item.name}` 
                            : item.name;
                        
                        let imageUrl = '';
                        let buyLink = `https://www.walmart.com/search?q=${encodeURIComponent(searchQuery)}`;

                        // --- LIVE API FETCH ---
                        try {
                            const res = await fetch(`/.netlify/functions/walmart?searchTerm=${encodeURIComponent(searchQuery)}&maxPrice=${retailItemPrice}`);
                            if (res.ok) {
                                const realProduct = await res.json();
                                displayTitle = realProduct.title || displayTitle;
                                retailItemPrice = realProduct.price || retailItemPrice;
                                imageUrl = realProduct.image || '';
                                buyLink = realProduct.link || buyLink;
                            }
                        } catch (err) {
                            console.log("API unavailable. Falling back to mock data.");
                        }

                        actualCategorySubtotal += retailItemPrice;
                        const cardDelay = 0.2 + ((i * 0.1)); // Reset delay for each category so they slide in smoothly

                        const imageHTML = imageUrl ? `<div style="height: 160px; background: url('${imageUrl}') center/contain no-repeat; margin-bottom: 20px; border-radius: 10px; background-color: #fff;"></div>` : '';

                        itemsHTML += `
                            <div class="product-card" style="animation: slideInRight 0.6s ${cardDelay}s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
                                ${imageHTML}
                                <div class="product-name" style="font-size: 1rem;">${displayTitle}</div>
                                <div class="product-desc">Proportionally balanced estimate.</div>
                                <div class="product-footer">
                                    <div class="product-price">$${retailItemPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                                    <a href="${buyLink}" target="_blank" class="buy-btn">View Item</a>
                                </div>
                            </div>
                        `;
                        globalItemIndex++;
                    }

                    actualGrandTotal += actualCategorySubtotal;
                    const fractionDisplay = `${cat.name} utilizes ${(cat.normalizedWeight * 100).toFixed(0)}% of your active budget.`;

                    const sectionHTML = `
                        <div class="category-section">
                            <div class="category-header">
                                <div class="category-title" style="color: ${cat.color}; text-shadow: 0 0 20px ${cat.color}40;">${cat.name}</div>
                                <div style="text-align: right;">
                                    <div class="category-allocation-wrapper">
                                        <div class="category-allocation" style="color: ${cat.color}; border-color: ${cat.color}50; background: ${cat.color}15;">
                                            Subtotal: $${actualCategorySubtotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                        </div>
                                        <div class="subtotal-tooltip">
                                            <strong style="color: ${cat.color}; display: block; margin-bottom: 8px; font-size: 1rem;">${fractionDisplay}</strong>
                                            ${cat.explanation}
                                        </div>
                                    </div>
                                    <span class="cat-target-note">Target: $${categoryTargetBudget.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                </div>
                            </div>
                            <div class="product-list">
                                ${itemsHTML}
                            </div>
                        </div>
                    `;
                    
                    // Clear the loader right before appending the first loaded category
                    if (!isFirstCategoryRendered) {
                        const loader = document.getElementById('loadingScreen');
                        if(loader) loader.style.display = 'none';
                        isFirstCategoryRendered = true;
                    }

                    categoriesContainer.insertAdjacentHTML('beforeend', sectionHTML);
                }

                // Append Final Grand Total Card
                const grandTotalHTML = `
                    <div class="grand-total-card">
                        <div class="gt-label">Total Estimated Kit Value</div>
                        <div class="gt-value" id="animatedTotal">$0.00</div>
                        <div class="gt-target">Based on your target budget of <span>$${totalTargetBudget.toLocaleString()}</span></div>
                    </div>
                `;
                grandTotalContainer.innerHTML = grandTotalHTML;

                setTimeout(() => {
                    const animatedTotalEl = document.getElementById('animatedTotal');
                    if(animatedTotalEl) animateValue(animatedTotalEl, 0, actualGrandTotal, 1500);
                }, 400);
            }
        });
    </script>
</body>
