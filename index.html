<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Kit Builder | Prep for Arrival</title>
    <style>
        :root {
            --bg-dark: #0f1115;
            --surface-dark: #1a1d24;
            --surface-light: #2a2e39;
            --text-main: #f8f9fa;
            --text-muted: #9ca3af;
            --pastel-gradient: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            --accent-color: #fbc2eb;
            --success-color: #34d399;
            --border-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 90px;
        }

        /* Navigation */
        nav {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(26, 29, 36, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--pastel-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* Setup View */
        #setup-view {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { font-size: 3.5rem; margin-bottom: 1rem; line-height: 1.2; }
        .subtitle { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 3rem; }

        .control-panel {
            background-color: var(--surface-dark);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .budget-display {
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        /* Slider CSS */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 30px 0;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px; width: 32px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 0 20px rgba(251, 194, 235, 0.4);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 8px; cursor: pointer;
            background: var(--surface-light); border-radius: 4px;
        }

        /* Buttons */
        .primary-btn {
            background: var(--pastel-gradient);
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
        }
        .primary-btn:hover { transform: translateY(-2px); }

        .secondary-btn {
            background: transparent; color: var(--text-muted); border: 1px solid var(--surface-light);
            padding: 10px 24px; border-radius: 20px; cursor: pointer;
        }

        /* Results View */
        #results-view { display: none; }
        .results-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }

        /* Product Cards */
        .category-section { margin-bottom: 60px; }
        .category-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--surface-light); padding-bottom: 10px;
        }
        .category-title { font-size: 1.5rem; font-weight: 700; }
        .category-allocation { color: var(--accent-color); font-weight: 600; }

        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        
        .product-card {
            background-color: var(--surface-dark); border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--border-radius); padding: 20px; display: flex; flex-direction: column;
        }

        .product-image {
            width: 100%; height: 200px; background-color: var(--surface-light);
            border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; color: var(--text-muted);
        }

        .product-name { font-size: 1.15rem; font-weight: 600; margin-bottom: 8px; }
        .product-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; flex-grow: 1; }
        
        .product-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--surface-light); padding-top: 15px; }
        .product-price { font-size: 1.25rem; font-weight: 700; color: var(--text-main); }
        
        .buy-btn {
            background-color: var(--surface-light); color: var(--text-main); text-decoration: none;
            padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BabyKit</div>
    </nav>

    <div class="container">
        
        <div id="setup-view">
            <h1>Build your perfect prep kit.</h1>
            <p class="subtitle">Set your budget, and we'll handle the math.</p>
            
            <div class="control-panel">
                <div class="budget-display" id="budgetDisplay">$1,000</div>
                <input type="range" id="budgetSlider" min="200" max="4000" step="50" value="1000">
                <button class="primary-btn" id="buildBtn">Generate My Kit</button>
            </div>
        </div>

        <div id="results-view">
            <div class="results-header">
                <div>
                    <h2>Your Curated Kit</h2>
                    <p style="color: var(--text-muted);">Optimized based on your budget.</p>
                </div>
                <button class="secondary-btn" id="startOverBtn">← Start Over</button>
            </div>

            <div id="categories-container">
                </div>
        </div>

    </div>

    <script>
        // Wait for the entire HTML document to load before running scripts
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Grab HTML Elements
            const setupView = document.getElementById('setup-view');
            const resultsView = document.getElementById('results-view');
            const budgetSlider = document.getElementById('budgetSlider');
            const budgetDisplay = document.getElementById('budgetDisplay');
            const buildBtn = document.getElementById('buildBtn');
            const startOverBtn = document.getElementById('startOverBtn');
            const categoriesContainer = document.getElementById('categories-container');

            // 2. Define Core Categories (Evenly split 20% each)
            const categories = [
                { name: "Sleeping & Nursery", split: 0.20 },
                { name: "Travel & Gear", split: 0.20 },
                { name: "Feeding & Nursing", split: 0.20 },
                { name: "Bath & Health", split: 0.20 },
                { name: "Clothing & Basics", split: 0.20 }
            ];

            // 3. Make the Slider Responsive
            budgetSlider.addEventListener('input', (e) => {
                const value = parseInt(e.target.value);
                budgetDisplay.textContent = '$' + value.toLocaleString();
            });

            // 4. Handle "Generate My Kit" Button Click
            buildBtn.addEventListener('click', () => {
                const totalBudget = parseInt(budgetSlider.value);
                
                // Switch pages
                setupView.style.display = 'none';
                resultsView.style.display = 'block';
                window.scrollTo(0, 0);

                // Build the list
                generateKitList(totalBudget);
            });

            // 5. Handle "Start Over" Button Click
            startOverBtn.addEventListener('click', () => {
                resultsView.style.display = 'none';
                setupView.style.display = 'block';
                window.scrollTo(0, 0);
            });

            // 6. Logic to generate the HTML for the items
            function generateKitList(totalBudget) {
                // Clear out old results
                categoriesContainer.innerHTML = ''; 

                categories.forEach(cat => {
                    const categoryBudget = totalBudget * cat.split;
                    
                    // Generate mock prices that add up to the category budget
                    const item1Price = categoryBudget * 0.60;
                    const item2Price = categoryBudget * 0.40;

                    // Build the HTML for this category block
                    const sectionHTML = `
                        <div class="category-section">
                            <div class="category-header">
                                <div class="category-title">${cat.name}</div>
                                <div class="category-allocation">Budget: $${categoryBudget.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            </div>
                            <div class="product-list">
                                
                                <div class="product-card">
                                    <div class="product-image">Primary Item</div>
                                    <div class="product-name">Premium ${cat.name} Essential</div>
                                    <div class="product-desc">The main necessity for this category.</div>
                                    <div class="product-footer">
                                        <div class="product-price">$${item1Price.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                                        <a href="#" class="buy-btn">Amazon Link</a>
                                    </div>
                                </div>

                                <div class="product-card">
                                    <div class="product-image">Secondary Item</div>
                                    <div class="product-name">Standard ${cat.name} Tool</div>
                                    <div class="product-desc">A highly rated everyday item.</div>
                                    <div class="product-footer">
                                        <div class="product-price">$${item2Price.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                                        <a href="#" class="buy-btn">Amazon Link</a>
                                    </div>
                                </div>

                            </div>
                        </div>
                    `;
                    
                    // Inject into the page
                    categoriesContainer.insertAdjacentHTML('beforeend', sectionHTML);
                });
            }
        });
    </script>
</body>
</html>
