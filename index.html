<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Kit Builder | Prep for Arrival</title>
    <style>
        :root {
            --bg-dark: #0f1115;
            --surface-dark: #1a1d24;
            --surface-light: #2a2e39;
            --text-main: #f8f9fa;
            --text-muted: #9ca3af;
            --pastel-gradient: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            --accent-color: #fbc2eb;
            --success-color: #34d399;
            --border-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 90px;
        }

        nav {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(26, 29, 36, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--pastel-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* Setup View */
        #setup-view {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { font-size: 3.5rem; margin-bottom: 1rem; line-height: 1.2; }
        .subtitle { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 3rem; }

        .control-panel {
            background-color: var(--surface-dark);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Gender Selector */
        .gender-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .gender-label {
            background: var(--surface-light);
            padding: 12px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            border: 2px solid transparent;
            transition: all 0.2s;
            user-select: none;
        }

        .gender-radio { display: none; }
        .gender-radio:checked + .gender-label {
            border-color: var(--accent-color);
            background: rgba(251, 194, 235, 0.1);
            color: var(--accent-color);
        }

        /* Category Selector */
        .category-selector {
            margin-bottom: 40px;
        }

        .category-title-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toggles-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .cat-label {
            background: var(--surface-light);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            border: 1px solid transparent;
            transition: all 0.2s;
            user-select: none;
        }

        .cat-checkbox { display: none; }
        .cat-checkbox:checked + .cat-label {
            background: rgba(161, 140, 209, 0.15);
            border-color: #a18cd1;
            color: #f8f9fa;
        }
        .cat-checkbox:not(:checked) + .cat-label {
            opacity: 0.6;
            text-decoration: line-through;
        }

        /* Budget Slider */
        .budget-display {
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 30px 0;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px; width: 32px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 0 20px rgba(251, 194, 235, 0.4);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 8px; cursor: pointer;
            background: var(--surface-light); border-radius: 4px;
        }

        .primary-btn {
            background: var(--pastel-gradient);
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
        }
        .primary-btn:hover { transform: translateY(-2px); }

        .secondary-btn {
            background: transparent; color: var(--text-muted); border: 1px solid var(--surface-light);
            padding: 10px 24px; border-radius: 20px; cursor: pointer;
        }

        /* Results View */
        #results-view { display: none; }
        .results-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }

        /* NEW: Pie Chart Styles */
        .pie-chart-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .pie-chart {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--surface-dark); /* Fallback */
            border: 1px solid rgba(255,255,255,0.05);
        }

        .chart-legend {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .category-section { margin-bottom: 60px; }
        .category-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--surface-light); padding-bottom: 10px;
        }
        .category-title { font-size: 1.5rem; font-weight: 700; }
        .category-allocation { color: var(--accent-color); font-weight: 600; }

        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        .product-card {
            background-color: var(--surface-dark); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 20px; display: flex; flex-direction: column;
        }

        .product-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
        .product-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; flex-grow: 1; }
        
        .product-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--surface-light); padding-top: 15px; }
        .product-price { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
        
        .buy-btn {
            background-color: var(--surface-light); color: var(--text-main); text-decoration: none;
            padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; text-align: center;
        }
        .buy-btn:hover { background-color: var(--text-main); color: #000; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BabyKit</div>
    </nav>

    <div class="container">
        
        <div id="setup-view">
            <h1>Build your prep kit.</h1>
            <p class="subtitle">Set your budget, uncheck what you already have, and we'll handle the rest.</p>
            
            <div class="control-panel">
                
                <div class="gender-selector">
                    <label>
                        <input type="radio" name="gender" value="boy" class="gender-radio">
                        <div class="gender-label">Boy</div>
                    </label>
                    <label>
                        <input type="radio" name="gender" value="girl" class="gender-radio">
                        <div class="gender-label">Girl</div>
                    </label>
                    <label>
                        <input type="radio" name="gender" value="neutral" class="gender-radio" checked>
                        <div class="gender-label">Unknown / Neutral</div>
                    </label>
                </div>

                <div class="category-selector">
                    <div class="category-title-label">Select Categories Needed</div>
                    <div class="toggles-grid" id="categoryTogglesContainer">
                        </div>
                </div>

                <div class="budget-display" id="budgetDisplay">$1,000</div>
                <input type="range" id="budgetSlider" min="300" max="4000" step="50" value="1000">
                <button class="primary-btn" id="buildBtn">Generate My Kit</button>
            </div>
        </div>

        <div id="results-view">
            <div class="results-header">
                <div>
                    <h2>Your Curated Kit</h2>
                    <p style="color: var(--text-muted);">Optimized based on your selections.</p>
                </div>
                <button class="secondary-btn" id="startOverBtn">← Edit Selections</button>
            </div>

            <div class="pie-chart-container" id="pieChartSection">
                <div class="pie-chart" id="pieChartCanvas"></div>
                <div class="chart-legend" id="chartLegend"></div>
            </div>

            <div id="categories-container">
                </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const setupView = document.getElementById('setup-view');
            const resultsView = document.getElementById('results-view');
            const budgetSlider = document.getElementById('budgetSlider');
            const budgetDisplay = document.getElementById('budgetDisplay');
            const buildBtn = document.getElementById('buildBtn');
            const startOverBtn = document.getElementById('startOverBtn');
            const categoriesContainer = document.getElementById('categories-container');
            const categoryTogglesContainer = document.getElementById('categoryTogglesContainer');
            const pieChartCanvas = document.getElementById('pieChartCanvas');
            const chartLegend = document.getElementById('chartLegend');

            // --- Updated Data Structure: 7 core categories with colors ---
            const initialCategoryWeights = {
                "Nursery & Furniture": { weight: 0.25, color: "#a18cd1" }, // Purple
                "Travel & Gear": { weight: 0.20, color: "#fbc2eb" }, // Pink
                "Feeding & Nursing": { weight: 0.15, color: "#aed9e0" }, // Light Blue
                "Diapering Needs": { weight: 0.15, color: "#f7d9a3" }, // Yellow
                "Clothing & Basics": { weight: 0.10, color: "#c5fadb" }, // Light Green
                "Bath, Health & Safety": { weight: 0.10, color: "#fdcfbc" }, // Peach
                "Play & Soothing": { weight: 0.05, color: "#b6eacb" } // Mint Green
            };

            const bundleTemplates = {
                "Nursery & Furniture": [
                    { name: "Crib or Bassinet", weight: 0.40, search: "crib bassinet" },
                    { name: "Nursery Glider", weight: 0.30, search: "nursery glider chair" },
                    { name: "Crib Mattress & Sheets", weight: 0.15, search: "crib mattress sheets" },
                    { name: "Video Baby Monitor", weight: 0.15, search: "video baby monitor" }
                ],
                "Travel & Gear": [
                    { name: "Infant Car Seat", weight: 0.45, search: "infant car seat" },
                    { name: "Travel Stroller", weight: 0.45, search: "baby stroller" },
                    { name: "Baby Carrier", weight: 0.10, search: "baby carrier wrap" }
                ],
                "Feeding & Nursing": [
                    { name: "Bottle Starter Set", weight: 0.35, search: "baby bottle starter set" },
                    { name: "Nursing Pillow & Pads", weight: 0.25, search: "nursing pillow breast pads" },
                    { name: "High Chair", weight: 0.25, search: "baby high chair" },
                    { name: "Burp Cloths (10-Pack)", weight: 0.15, search: "cotton burp cloths" }
                ],
                "Diapering Needs": [
                    { name: "Diaper Stockpile (NB & Size 1)", weight: 0.40, search: "newborn size 1 diapers" },
                    { name: "Baby Wipes Bulk Box", weight: 0.25, search: "water baby wipes bulk" },
                    { name: "Diaper Pail & Refills", weight: 0.20, search: "diaper pail" },
                    { name: "Changing Pad & Creams", weight: 0.15, search: "changing pad diaper cream" }
                ],
                "Clothing & Basics": [
                    { name: "Sleep & Plays (5-Pack)", weight: 0.40, search: "sleep and play footies" },
                    { name: "Bodysuits (7-Pack)", weight: 0.30, search: "bodysuits pack" },
                    { name: "Swaddle Blankets (3-Pack)", weight: 0.20, search: "swaddle blankets" },
                    { name: "Socks & Mittens", weight: 0.10, search: "socks and mittens set" }
                ],
                "Bath, Health & Safety": [
                    { name: "Baby Bathtub", weight: 0.30, search: "baby bathtub" },
                    { name: "Healthcare Kit & Thermometer", weight: 0.30, search: "baby grooming kit thermometer" },
                    { name: "Hooded Towels & Washcloths", weight: 0.25, search: "baby hooded towel washcloths" },
                    { name: "Gentle Wash & Lotion", weight: 0.15, search: "gentle baby wash shampoo" }
                ],
                "Play & Soothing": [
                    { name: "Baby Bouncer or Swing", weight: 0.60, search: "baby bouncer swing" },
                    { name: "Tummy Time Play Mat", weight: 0.30, search: "baby play mat gym" },
                    { name: "Pacifier Variety Pack", weight: 0.10, search: "newborn pacifiers" }
                ]
            };

            // Inject Checkboxes dynamically
            Object.keys(bundleTemplates).forEach(cat => {
                const labelHtml = `
                    <label>
                        <input type="checkbox" value="${cat}" class="cat-checkbox" checked>
                        <div class="cat-label">${cat} <span style="font-size: 0.75rem; opacity: 0.7;">(${(initialCategoryWeights[cat].weight * 100).toFixed(0)}%)</span></div>
                    </label>
                `;
                categoryTogglesContainer.insertAdjacentHTML('beforeend', labelHtml);
            });

            // Failsafe: Ensure at least one category is checked
            categoryTogglesContainer.addEventListener('change', () => {
                const checkedCount = document.querySelectorAll('.cat-checkbox:checked').length;
                if (checkedCount === 0) {
                    buildBtn.disabled = true;
                    buildBtn.style.opacity = "0.5";
                } else {
                    buildBtn.disabled = false;
                    buildBtn.style.opacity = "1";
                }
            });

            budgetSlider.addEventListener('input', (e) => {
                budgetDisplay.textContent = '$' + parseInt(e.target.value).toLocaleString();
            });

            buildBtn.addEventListener('click', () => {
                if(buildBtn.disabled) return;

                const totalBudget = parseInt(budgetSlider.value);
                
                // Get selected gender
                const selectedGenderInput = document.querySelector('input[name="gender"]:checked');
                const gender = selectedGenderInput ? selectedGenderInput.value : "neutral";

                // Get selected categories
                const activeCategoryNames = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(cb => cb.value);
                
                setupView.style.display = 'none';
                resultsView.style.display = 'block';
                window.scrollTo(0, 0);

                // --- Calculate Normalized Weights and Total Active Weight ---
                let totalActiveWeight = 0;
                activeCategoryNames.forEach(cat => totalActiveWeight += initialCategoryWeights[cat].weight);

                const kitData = activeCategoryNames.map(name => {
                    const normalizedWeight = initialCategoryWeights[name].weight / totalActiveWeight;
                    return {
                        name,
                        color: initialCategoryWeights[name].color,
                        normalizedWeight: normalizedWeight
                    }
                });

                // Generate Pie Chart and Legend
                renderPieChart(kitData);

                // Generate Item List
                generateKitList(totalBudget, gender, kitData);
            });

            startOverBtn.addEventListener('click', () => {
                resultsView.style.display = 'none';
                setupView.style.display = 'block';
                window.scrollTo(0, 0);
            });

            // --- NEW: Generate SVG Pie Chart and Legend ---
            function renderPieChart(kitData) {
                pieChartCanvas.innerHTML = ''; // Clear old chart
                chartLegend.innerHTML = ''; // Clear old legend

                let currentAngle = 0;
                const radius = 40;
                const centerX = 40;
                const centerY = 40;

                let svgHtml = `<svg width="80" height="80" viewBox="0 0 80 80">`;

                // Render Slices
                kitData.forEach(cat => {
                    const sliceAngle = cat.normalizedWeight * 360;
                    
                    // Large arc flag is 1 if angle > 180 degrees
                    const largeArcFlag = sliceAngle > 180 ? 1 : 0;

                    // Calculate start and end coordinates of the arc
                    const startRadians = (currentAngle - 90) * (Math.PI / 180);
                    const endRadians = (currentAngle + sliceAngle - 90) * (Math.PI / 180);

                    const startX = centerX + radius * Math.cos(startRadians);
                    const startY = centerY + radius * Math.sin(startRadians);
                    const endX = centerX + radius * Math.cos(endRadians);
                    const endY = centerY + radius * Math.sin(endRadians);

                    // Move to center, draw line to start, draw arc to end, close path back to center
                    svgHtml += `
                        <path d="M${centerX},${centerY} L${startX},${startY} A${radius},${radius} 0 ${largeArcFlag},1 ${endX},${endY} Z" 
                              fill="${cat.color}" stroke="var(--surface-dark)" stroke-width="0.5"/>
                    `;

                    // Render Legend Item
                    const legendItemHtml = `
                        <div class="legend-item">
                            <div class="legend-color" style="background-color: ${cat.color};"></div>
                            <span>${cat.name} (${(cat.normalizedWeight * 100).toFixed(0)}%)</span>
                        </div>
                    `;
                    chartLegend.insertAdjacentHTML('beforeend', legendItemHtml);

                    currentAngle += sliceAngle;
                });

                svgHtml += `</svg>`;
                pieChartCanvas.insertAdjacentHTML('beforeend', svgHtml);
            }

            function generateKitList(totalBudget, gender, kitData) {
                categoriesContainer.innerHTML = ''; 
                
                const genderStr = gender === "neutral" ? "gender neutral" : "baby " + gender;

                kitData.forEach(cat => {
                    // Recalibrate budget based on normalized weight
                    const categoryBudget = totalBudget * cat.normalizedWeight;
                    
                    const items = bundleTemplates[cat.name];
                    let itemsHTML = '';

                    items.forEach(item => {
                        const itemPrice = categoryBudget * item.weight;
                        const searchQuery = encodeURIComponent(`${genderStr} ${item.search}`);
                        const amazonLink = `https://www.amazon.com/s?k=${searchQuery}`;

                        const displayTitle = cat.name === "Clothing & Basics" 
                            ? `${gender === 'neutral' ? 'Neutral' : gender.charAt(0).toUpperCase() + gender.slice(1)} ${item.name}` 
                            : item.name;

                        itemsHTML += `
                            <div class="product-card">
                                <div class="product-name">${displayTitle}</div>
                                <div class="product-desc">Calculated based on your updated parameters.</div>
                                <div class="product-footer">
                                    <div class="product-price">$${itemPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                                    <a href="${amazonLink}" target="_blank" class="buy-btn">Search Amazon</a>
                                </div>
                            </div>
                        `;
                    });

                    const sectionHTML = `
                        <div class="category-section">
                            <div class="category-header">
                                <div class="category-title" style="color: ${cat.color}">${cat.name}</div>
                                <div class="category-allocation">Budget: $${categoryBudget.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                            </div>
                            <div class="product-list">
                                ${itemsHTML}
                            </div>
                        </div>
                    `;
                    
                    categoriesContainer.insertAdjacentHTML('beforeend', sectionHTML);
                });
            }
        });
    </script>
</body>
</html>
